name: Validate Keyboard Mastery Phase C

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4

      - name: Apply verified mastery-card integration
        run: python scripts/apply_mastery_phase_c.py

      - name: Upload transformed mastery card
        uses: actions/upload-artifact@v4
        with:
          name: mastery-phase-c-card
          path: app/src/main/java/io/github/daddymean/agentickeyboard/ui/KeyboardMasteryCard.kt
          retention-days: 7

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build debug APK and run unit tests
        shell: bash
        run: |
          set -o pipefail
          ./gradlew testDebugUnitTest assembleDebug --stacktrace 2>&1 | tee phase-c-build.log

      - name: Upload compiler log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mastery-phase-c-build-log
          path: phase-c-build.log
          retention-days: 7

      - name: Build release APK (R8)
        run: ./gradlew assembleRelease --stacktrace
