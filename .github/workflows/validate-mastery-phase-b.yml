name: Validate Keyboard Mastery Phase B

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4

      - name: Apply verified ViewModel integration
        run: python scripts/apply_mastery_phase_b.py

      - name: Upload transformed ViewModel
        uses: actions/upload-artifact@v4
        with:
          name: mastery-phase-b-viewmodel
          path: app/src/main/java/io/github/daddymean/agentickeyboard/ui/KeyboardViewModel.kt
          retention-days: 7

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build debug APK and run unit tests
        run: ./gradlew testDebugUnitTest assembleDebug --stacktrace

      - name: Build release APK (R8)
        run: ./gradlew assembleRelease --stacktrace
