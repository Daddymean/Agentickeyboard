name: Validate Sounds Like You Score

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply verified voice-score integration
        run: python scripts/promote_voice_match.py

      - name: Upload transformed source
        uses: actions/upload-artifact@v4
        with:
          name: sounds-like-you-source
          path: |
            app/src/main/java/io/github/daddymean/agentickeyboard/ui/KeyboardViewModel.kt
            app/src/main/java/io/github/daddymean/agentickeyboard/ui/AgenticKeyboardLayout.kt
          retention-days: 7

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build debug APK and run unit tests
        shell: bash
        run: |
          set -o pipefail
          ./gradlew testDebugUnitTest assembleDebug --stacktrace 2>&1 | tee voice-match-build.log

      - name: Upload compiler log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sounds-like-you-build-log
          path: voice-match-build.log
          retention-days: 7

      - name: Build release APK (R8)
        run: ./gradlew assembleRelease --stacktrace

      - name: Promote validated source to branch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            app/src/main/java/io/github/daddymean/agentickeyboard/ui/KeyboardViewModel.kt \
            app/src/main/java/io/github/daddymean/agentickeyboard/ui/AgenticKeyboardLayout.kt
          if git diff --cached --quiet; then
            echo "Validated source already present."
          else
            git commit -m "Integrate local Sounds Like You score"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi
