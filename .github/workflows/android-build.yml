name: Android Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build debug APK and run unit tests
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Apply AI session controller migration
        if: github.event_name == 'pull_request' && github.head_ref == 'refactor/ai-session-controller'
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('app/src/main/java/io/github/daddymean/agentickeyboard/ui/KeyboardViewModel.kt')
          text = path.read_text()

          def one(source, old, new, label):
              count = source.count(old)
              if count != 1:
                  raise RuntimeError(f'{label}: expected 1 occurrence, found {count}')
              return source.replace(old, new, 1)

          text = one(
              text,
              'import kotlinx.coroutines.cancelAndJoin\n',
              '',
              'cancelAndJoin import'
          )
          text = one(
              text,
              '''    // Exactly one AI panel can be active at a time.
    private val _aiPanelState = MutableStateFlow<AiPanelState>(AiPanelState.Idle)
    val aiPanelState = _aiPanelState.asStateFlow()
''',
              '''    // Foreground AI request lifecycle and panel ownership.
    private val aiSession = AiSessionController(viewModelScope)
    private var activeAiPanel: AiPanelState
        get() = aiSession.currentState
        set(value) = aiSession.publish(value)
    val aiPanelState = aiSession.panelState
''',
              'AI panel state declaration'
          )
          text = one(text, '    private var aiJob: Job? = null\n', '', 'AI job field')
          text = one(
              text,
              '''    override fun onCleared() {
        settings?.unregisterListener(prefsListener)
        super.onCleared()
    }
''',
              '''    override fun onCleared() {
        aiSession.cancel()
        settings?.unregisterListener(prefsListener)
        super.onCleared()
    }
''',
              'onCleared cleanup'
          )
          text = one(
              text,
              '''    /**
     * Cancels any in-flight AI request and starts a new one, so rapid taps never
     * stack requests or leave a stale spinner.
     */
    // Re-runs the most recent AI action with the response cache bypassed, so the
    // ↻ button on a result panel always produces a fresh variant.
    private var regenerateAction: (() -> Unit)? = null

    fun regenerate() {
        regenerateAction?.invoke()
    }

    /**
     * Iterate on the currently shown text result (Shorter/Longer/Warmer/...):
     * clears the panels and rewrites the result text with the chip's instruction.
     */
    fun refineResult(adjustment: String) {
        val current = _aiPanelState.value.refinableText ?: return
        val instruction = RESULT_REFINEMENTS[adjustment] ?: adjustment
        dismissResults()
        rewriteWithStyle(current, instruction, bypassCache = true)
    }

    private fun launchAi(block: suspend () -> Unit) {
        val previous = aiJob
        aiJob = viewModelScope.launch {
            previous?.cancelAndJoin()
            _aiPanelState.value = AiPanelState.Loading
            try {
                block()
            } catch (e: CancellationException) {
                throw e
            } catch (_: Exception) {
                // A missed action error must not crash the IME process.
            } finally {
                if (_aiPanelState.value == AiPanelState.Loading) {
                    _aiPanelState.value = AiPanelState.Idle
                }
            }
        }
    }
''',
              '''    // Re-runs the most recent AI action with the response cache bypassed.
    fun regenerate() {
        aiSession.regenerate()
    }

    /**
     * Iterate on the currently shown text result (Shorter/Longer/Warmer/...):
     * clears the panel and rewrites the result text with the chip's instruction.
     */
    fun refineResult(adjustment: String) {
        val current = aiSession.currentState.refinableText ?: return
        val instruction = RESULT_REFINEMENTS[adjustment] ?: adjustment
        dismissResults()
        rewriteWithStyle(current, instruction, bypassCache = true)
    }

    private fun launchAi(block: suspend () -> Unit) {
        aiSession.launch { block() }
    }
''',
              'AI lifecycle block'
          )

          if text.count('        regenerateAction = {') != 9:
              raise RuntimeError('expected 9 regenerate assignments')
          text = text.replace(
              '        regenerateAction = {',
              '        aiSession.setRegenerateAction {'
          )
          text = text.replace('_aiPanelState.value', 'activeAiPanel')

          if '_aiPanelState' in text or 'regenerateAction' in text or 'aiJob' in text or 'cancelAndJoin' in text:
              raise RuntimeError('legacy AI session state remains after migration')

          path.write_text(text)
          PY
          git diff --check

      - name: Export transformed ViewModel blob
        if: github.event_name == 'pull_request' && github.head_ref == 'refactor/ai-session-controller'
        run: |
          python - <<'PY'
          import base64
          import json
          import os
          import subprocess
          from pathlib import Path

          repository = os.environ['GITHUB_REPOSITORY']
          head_sha = os.environ['PR_HEAD_SHA']
          path = 'app/src/main/java/io/github/daddymean/agentickeyboard/ui/KeyboardViewModel.kt'
          payload = {
              'content': base64.b64encode(Path(path).read_bytes()).decode(),
              'encoding': 'base64',
          }
          Path('/tmp/blob-payload.json').write_text(json.dumps(payload))
          blob = subprocess.check_output([
              'gh', 'api', '--method', 'POST',
              f'repos/{repository}/git/blobs',
              '--input', '/tmp/blob-payload.json',
              '--jq', '.sha'
          ], text=True).strip()
          base_tree = subprocess.check_output([
              'gh', 'api', f'repos/{repository}/git/commits/{head_sha}', '--jq', '.tree.sha'
          ], text=True).strip()
          manifest = {
              'parent': head_sha,
              'base_tree': base_tree,
              'path': path,
              'blob': blob,
          }
          Path('ai-session-controller-migration.json').write_text(json.dumps(manifest, indent=2))
          PY
        env:
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}

      - name: Upload ViewModel migration manifest
        if: github.event_name == 'pull_request' && github.head_ref == 'refactor/ai-session-controller'
        uses: actions/upload-artifact@v4
        with:
          name: ai-session-controller-migration
          path: ai-session-controller-migration.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build debug APK and run unit tests
        run: ./gradlew assembleDebug testDebugUnitTest --stacktrace

      # Compiles the R8-minified release APK (unsigned - CI has no keystore) so
      # shrinking/obfuscation problems surface on every push, not at ship time.
      - name: Build release APK (R8)
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-unsigned
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload unit test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: app/build/reports/tests/testDebugUnitTest
          if-no-files-found: ignore

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
