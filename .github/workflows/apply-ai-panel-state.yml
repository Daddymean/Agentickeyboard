name: Apply AI panel state refactor

on:
  pull_request:
    types: [opened, synchronize]
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'refactor/ai-panel-state'
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply verified source transformations
        run: python tools/apply_ai_panel_state_refactor.py

      - name: Remove one-shot migration files
        run: |
          rm tools/apply_ai_panel_state_refactor.py
          rm .github/workflows/apply-ai-panel-state.yml

      - name: Validate and publish transformed sources
        run: |
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Consolidate AI panel state"
          git push origin HEAD:${{ github.head_ref }}
